<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="ball">
      <circle cx="16" cy="16" r="15" />
    </clipPath>
  </defs>
  <g clip-path="url(#ball)">
    <rect x="0" y="0" width="32" height="16" fill="#ee1c25" />
    <rect x="0" y="16" width="32" height="16" fill="#f7f7f7" />
    <!-- soft top highlight -->
    <circle cx="11" cy="9" r="3" fill="#ffffff" opacity="0.22" />
    <!-- center band -->
    <rect x="0" y="13" width="32" height="6" fill="#111418" />
  </g>
  <!-- outer ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#111418" stroke-width="2" />
  <!-- center button -->
  <circle cx="16" cy="16" r="5.5" fill="#111418" />
  <circle cx="16" cy="16" r="3.4" fill="#f7f7f7" />
  <circle cx="16" cy="16" r="1.4" fill="#cdd3da" />
</svg>
