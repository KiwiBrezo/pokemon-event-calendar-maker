# Pokémon Event Calendar — nginx config for the kiwi-dev "demo-server" container.
# =============================================================================
# Topology:  browser → Traefik (Host kiwi-dev..., PathPrefix /demo-server, NO
#            stripPrefix) → this nginx (container :18092).
# So nginx receives the FULL path, e.g. /demo-server/pokemon-event-calendar/... .
#
# The app is a static SPA built with baseURL /demo-server/pokemon-event-calendar/
# (must equal the full public path or _nuxt/* assets 404).
# Google Calendar feeds send no CORS headers, so the browser fetches the .ics via
# the same-origin proxy block (a), which relays it to Google. A static location
# CANNOT do this.
#
# Deploy:
#   1. npm run generate
#   2. copy .output/public/*  ->  the dir the static `alias` below points at
#   3. reload/restart the nginx container so this config is live:
#        docker exec <container> nginx -t && docker exec <container> nginx -s reload
#      (if the config is baked into the image, rebuild + docker restart instead)
# =============================================================================

server {
  listen 80;

  # (a) iCal proxy -> Google Calendar. Longest matching prefix, so it wins over
  #     the /demo-server/pokemon-event-calendar/ and /demo-server/ static blocks.
  location /demo-server/pokemon-event-calendar/ical/ {
      proxy_pass https://calendar.google.com/calendar/ical/;
      proxy_set_header Host calendar.google.com;
      proxy_ssl_server_name on;             # SNI — required for Google's TLS
      proxy_set_header Accept-Encoding "";   # hand the browser plain text
      # If nginx can't resolve calendar.google.com at runtime (some containers),
      # uncomment the next line:
      # resolver 8.8.8.8 1.1.1.1 valid=300s;
  }
}
