# Pokémon Event Calendar — full nginx server block (merged with the demo-server site).
# ---------------------------------------------------------------------------------
# Deploy:
#   1. npm run generate
#   2. copy .output/public/*  ->  the directory the `alias` below points at
#   3. nginx -t && nginx -s reload   (or restart the container)
#
# The app is a static SPA built with baseURL /pokemon-event-calendar/, so it is
# served at  http://<host>/pokemon-event-calendar/  (NOT under /demo-server/).
# Google Calendar feeds send no CORS headers, so the browser fetches the .ics
# through the same-origin proxy in block (a), which relays it to Google.

server {
  listen 80;

  # (a) iCal proxy → Google Calendar. More specific than (b), so it matches first.
  location /pokemon-event-calendar/ical/ {
      proxy_pass https://calendar.google.com/calendar/ical/;
      proxy_set_header Host calendar.google.com;
      proxy_ssl_server_name on;             # SNI — required for Google's TLS
      proxy_set_header Accept-Encoding "";   # hand the browser plain text
      # If nginx can't resolve calendar.google.com at runtime (some containers),
      # uncomment the next line:
      # resolver 8.8.8.8 1.1.1.1 valid=300s;
  }

  # (b) Static app + SPA fallback.
  #     alias = the folder that contains index.html, _nuxt/, icons/, _payload.json …
  #     >>> CONFIRM THIS PATH matches where you copied .output/public/* <<<
  location /pokemon-event-calendar/ {
      alias /demo-server/files/pokemon-event-calendar/;
      try_files $uri $uri/ /pokemon-event-calendar/index.html;
  }
}
